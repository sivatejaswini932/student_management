<!DOCTYPE html>
<html>

<head>

    <title>Students</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav>

    <h2>Student Management</h2>

    <div>
        <a href="/">Home</a>
        <a href="/students">Students</a>
    </div>

</nav>

<div class="container">

    <h1>Student Records</h1>

    <form method="GET"
    action="/students"
    class="search-box">

        <input type="text"
        name="search"
        placeholder="Search Student">

        <button type="submit">
            Search
        </button>

    </form>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>

            <td>

                <a href="/update/{{ student[0] }}">
                    <button class="edit-btn">
                        Edit
                    </button>
                </a>

                <a href="/delete/{{ student[0] }}">
                    <button class="delete-btn">
                        Delete
                    </button>
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>

</html>
